# Databricks Asset Bundle - PokeLakehouse Workflow
# Deploy with: databricks bundle deploy
# Run with: databricks bundle run pokelakehouse_job

resources:
  jobs:
    pokelakehouse_job:
      name: "pokelakehouse_pipeline"

      job_clusters:
        - job_cluster_key: pokelakehouse_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_F2s_v2"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.databricks.cluster.profile: "singleNode"

      tasks:
        - task_key: bronze_ingest
          job_cluster_key: pokelakehouse_cluster
          notebook_task:
            notebook_path: ../notebooks/1_bronze/01_ingest_pokeapi.py

        - task_key: silver_pokemon
          job_cluster_key: pokelakehouse_cluster
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../notebooks/2_silver/02_transform_pokemon.py

        - task_key: silver_types_abilities
          job_cluster_key: pokelakehouse_cluster
          depends_on:
            - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../notebooks/2_silver/03_transform_types_abilities.py

        - task_key: quality_gate
          job_cluster_key: pokelakehouse_cluster
          depends_on:
            - task_key: silver_pokemon
            - task_key: silver_types_abilities
          notebook_task:
            notebook_path: ../notebooks/3_quality/04_data_quality_checks.py

        - task_key: gold_build
          job_cluster_key: pokelakehouse_cluster
          depends_on:
            - task_key: quality_gate
          notebook_task:
            notebook_path: ../notebooks/4_gold/05_build_star_schema.py
